
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1A0D08">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="dark">
<title>EMI Passbook · தவணை பாஸ்புக்</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700;800&family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════════════
   Design tokens
   ══════════════════════════════════════════════════════════════════════════ */
@property --ring   { syntax:'<number>'; inherits:false; initial-value:0; }
@property --sheen  { syntax:'<length>'; inherits:false; initial-value:-140px; }

:root{
  --bg-0:#140A06; --bg-1:#2B0F18; --bg-2:#1A0D08;
  --gold:#D9A93C; --gold-2:#F2D592; --gold-dim:rgba(217,169,60,.28);
  --maroon:#7A1226; --maroon-2:#A6203A;
  --paper:#FCF6E9; --ink:#2A1810; --muted:#8A6E52;
  --green:#2E9B57; --green-2:#7BD9A1; --red:#D9534F; --amber:#E0A73B;
  --glass:rgba(255,255,255,.055);
  --glass-line:rgba(232,200,116,.16);
  --r-lg:20px; --r-md:15px; --r-sm:11px;
  /* spring easing — fallback first, then the modern linear() curve */
  --spring:cubic-bezier(.22,1,.36,1);
  --spring:linear(0,.006,.025 2.8%,.101 6.1%,.539 18.9%,.721 25.3%,.849 31.5%,.937 38.1%,.968 41.8%,.991 45.7%,1.006 50.1%,1.015 55%,1.017 63.9%,1.001);
  --ease:cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Inter','Noto Sans Tamil',Latha,system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(120% 80% at 50% -10%, #4A1424 0%, transparent 60%),
    radial-gradient(90% 60% at 100% 100%, #2A1208 0%, transparent 55%),
    linear-gradient(170deg,var(--bg-0) 0%, var(--bg-2) 55%, #0E0705 100%);
  background-attachment:fixed;
  color:var(--paper);min-height:100dvh;
  padding:calc(16px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right))
          calc(34px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
  display:flex;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.wrap{width:100%;max-width:440px;}
.ta{font-family:'Noto Sans Tamil',Latha,sans-serif;font-weight:500;}
.num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1;}
:focus-visible{outline:2.5px solid var(--gold-2);outline-offset:3px;border-radius:6px;}

/* reveal-on-scroll primitive */
.rv{opacity:0;transform:translateY(18px) scale(.985);
    transition:opacity .6s var(--ease), transform .7s var(--spring);}
.rv.in{opacity:1;transform:none;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important;}
  .rv{opacity:1;transform:none;}
}

/* ══════════════════════════════════════════════════════════════════════════
   Lock screen
   ══════════════════════════════════════════════════════════════════════════ */
#lock{animation:riseIn .6s var(--spring) both;}
@keyframes riseIn{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}

.paper{background:var(--paper);border-radius:var(--r-lg);padding:5px;color:var(--ink);
  box-shadow:0 30px 70px -18px rgba(0,0,0,.8), 0 0 0 1px var(--gold-dim);}
.paper>.in{border:1px solid rgba(184,134,11,.32);border-radius:calc(var(--r-lg) - 6px);
  padding:24px 20px;position:relative;overflow:hidden;}

.kolam{height:7px;border-radius:4px;opacity:.45;
  background:repeating-linear-gradient(90deg,var(--gold) 0 5px,transparent 5px 11px);}

.seal{width:70px;height:70px;margin:16px auto 14px;border-radius:50%;position:relative;
  background:linear-gradient(145deg,var(--maroon-2),var(--maroon));
  display:grid;place-items:center;font-size:30px;
  box-shadow:0 10px 26px -6px rgba(122,18,38,.6), inset 0 1px 0 rgba(255,255,255,.18);}
.seal::after{content:'';position:absolute;inset:-7px;border-radius:50%;
  border:1.5px solid var(--gold-dim);animation:halo 3.4s ease-in-out infinite;}
@keyframes halo{0%,100%{transform:scale(1);opacity:.65}50%{transform:scale(1.09);opacity:.15}}

.lk-shop{font-family:'DM Serif Display',serif;font-size:25px;color:var(--maroon);text-align:center;line-height:1.15;}
.lk-shop-ta{font-size:13px;color:var(--muted);text-align:center;margin-top:3px;}
.pill{display:inline-block;background:var(--maroon);color:var(--gold-2);border-radius:20px;
  padding:5px 15px;font-size:10.5px;font-weight:700;letter-spacing:.08em;}
.lk-hi{text-align:center;font-size:16px;font-weight:800;margin:20px 0 3px;color:var(--ink);text-wrap:balance;}
.lk-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:20px;}

.pins{display:flex;gap:11px;justify-content:center;}
.pins input{width:54px;height:64px;text-align:center;font-size:27px;font-weight:800;
  border:2px solid rgba(184,134,11,.4);border-radius:14px;background:#fff;color:var(--maroon);
  outline:none;font-family:'Inter',sans-serif;caret-color:var(--maroon);
  transition:border-color .2s var(--ease), box-shadow .2s var(--ease), transform .35s var(--spring);}
.pins input:focus{border-color:var(--maroon);box-shadow:0 0 0 4px rgba(122,18,38,.13);transform:translateY(-3px);}
.pins input.ok{border-color:var(--green);background:#F5FDF8;transform:scale(1.04);}
.pins.shake{animation:shake .45s var(--ease);}
@keyframes shake{0%,100%{transform:translateX(0)}18%{transform:translateX(-10px)}36%{transform:translateX(10px)}
  56%{transform:translateX(-6px)}76%{transform:translateX(4px)}}
.err{text-align:center;font-size:12px;color:var(--red);font-weight:700;min-height:18px;margin-top:10px;}
.hint{text-align:center;font-size:10.5px;color:#A88A60;margin-top:16px;line-height:1.65;}

/* unlock curtain */
#fx{position:fixed;inset:0;z-index:200;display:none;place-items:center;
  background:rgba(14,7,5,.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#fx.on{display:grid;}
#fx .ring{width:88px;height:88px;border-radius:50%;
  background:conic-gradient(from 0deg,transparent,var(--gold-2));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 0);
          mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 0);
  animation:spin .85s linear infinite;}
@keyframes spin{to{transform:rotate(1turn)}}
#fx .tick{position:absolute;font-size:42px;opacity:0;transform:scale(.3);}
#fx .tick.go{animation:pop .5s var(--spring) forwards;}
@keyframes pop{to{opacity:1;transform:scale(1)}}

/* ══════════════════════════════════════════════════════════════════════════
   Passbook
   ══════════════════════════════════════════════════════════════════════════ */
#book{display:none;}
#book.show{display:block;}

/* sticky condensed bar */
#bar{position:fixed;left:0;right:0;top:0;z-index:120;
  padding:calc(9px + env(safe-area-inset-top)) 16px 9px;
  background:rgba(20,10,6,.82);backdrop-filter:blur(16px) saturate(1.5);
  -webkit-backdrop-filter:blur(16px) saturate(1.5);
  border-bottom:1px solid var(--glass-line);
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  transform:translateY(-102%);transition:transform .42s var(--spring);}
#bar.on{transform:none;}
#bar .l{font-size:12.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#bar .l small{display:block;font-size:9.5px;font-weight:600;color:rgba(252,246,233,.62);}
#bar .r{font-size:15px;font-weight:800;color:var(--gold-2);white-space:nowrap;}

/* hero */
.hero{position:relative;border-radius:var(--r-lg);padding:20px 18px 18px;margin-bottom:12px;overflow:hidden;
  background:linear-gradient(150deg,var(--maroon-2) 0%, var(--maroon) 48%, #55091A 100%);
  box-shadow:0 24px 54px -20px rgba(122,18,38,.85), inset 0 1px 0 rgba(255,255,255,.14);}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(70% 50% at 85% 0%, rgba(255,255,255,.14), transparent 70%);}
.hero .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;position:relative;}
.hero .who{font-size:19px;font-weight:800;line-height:1.2;letter-spacing:-.01em;}
.hero .meta{font-size:10.5px;color:rgba(252,246,233,.62);margin-top:4px;font-weight:500;}
.tagchip{flex-shrink:0;font-size:9px;font-weight:800;letter-spacing:.07em;padding:5px 10px;border-radius:20px;
  background:rgba(255,255,255,.13);border:1px solid rgba(242,213,146,.3);color:var(--gold-2);}

.heroMid{display:flex;align-items:center;gap:16px;margin-top:18px;position:relative;}
.bal{flex:1;min-width:0;}
.bal .lbl{font-size:9px;font-weight:800;letter-spacing:.13em;color:var(--gold-2);opacity:.85;}
.bal .lbl .ta{display:block;font-size:10px;letter-spacing:0;font-weight:600;opacity:.9;}
.bal .v{font-family:'DM Serif Display',serif;font-size:clamp(30px,9.2vw,38px);line-height:1.05;margin-top:5px;
  letter-spacing:-.02em;text-shadow:0 2px 14px rgba(0,0,0,.28);}

/* conic progress ring */
.ring{--ring:0;width:82px;height:82px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;position:relative;
  background:conic-gradient(from -90deg, var(--gold-2) calc(var(--ring) * 1%), rgba(255,255,255,.15) 0);}
.ring::before{content:'';position:absolute;inset:7px;border-radius:50%;
  background:linear-gradient(150deg,#7E1327,#5C0C1C);box-shadow:inset 0 1px 3px rgba(0,0,0,.45);}
.ring .rv2{position:relative;text-align:center;line-height:1;}
.ring .pc{font-size:19px;font-weight:900;letter-spacing:-.03em;}
.ring .of{font-size:8.5px;font-weight:700;color:rgba(252,246,233,.62);margin-top:2px;}

.duechip{margin-top:16px;position:relative;display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.22);border:1px solid rgba(242,213,146,.2);border-radius:12px;padding:9px 12px;}
.duechip .dot{width:8px;height:8px;border-radius:50%;background:var(--gold-2);flex-shrink:0;
  box-shadow:0 0 0 0 rgba(242,213,146,.6);animation:ping 2.4s var(--ease) infinite;}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(242,213,146,.55)}70%{box-shadow:0 0 0 11px rgba(242,213,146,0)}100%{box-shadow:0 0 0 0 rgba(242,213,146,0)}}
.duechip .dot.late{background:var(--red);animation-name:pinglate;}
@keyframes pinglate{0%{box-shadow:0 0 0 0 rgba(217,83,79,.6)}70%{box-shadow:0 0 0 11px rgba(217,83,79,0)}100%{box-shadow:0 0 0 0 rgba(217,83,79,0)}}
.duechip .t{font-size:11.5px;font-weight:700;flex:1;}
.duechip .t small{display:block;font-size:9.5px;font-weight:500;color:rgba(252,246,233,.66);}

/* KPI cards */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi{position:relative;overflow:hidden;border-radius:var(--r-md);padding:13px 13px 12px;
  background:var(--glass);border:1px solid var(--glass-line);
  backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
  transition:transform .34s var(--spring), border-color .3s var(--ease), background .3s var(--ease);}
.kpi::after{content:'';position:absolute;top:0;bottom:0;width:80px;pointer-events:none;
  left:var(--sheen);
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.11),transparent);}
.kpi.lit::after{animation:sheen 1.15s var(--ease) forwards;}
@keyframes sheen{from{--sheen:-140px}to{--sheen:130%}}
.kpi:active{transform:scale(.975);}
.kpi .ic{font-size:13px;opacity:.85;}
.kpi .l{font-size:8.5px;font-weight:800;letter-spacing:.07em;color:rgba(252,246,233,.62);
  text-transform:uppercase;margin-top:7px;}
.kpi .l .ta{display:block;font-size:9.5px;letter-spacing:0;text-transform:none;font-weight:500;opacity:.85;}
.kpi .v{font-size:clamp(15px,4.7vw,19px);font-weight:800;margin-top:4px;letter-spacing:-.02em;line-height:1.15;}
.kpi.good .v{color:var(--green-2);} .kpi.warn .v{color:var(--amber);}
.kpi.gold .v{color:var(--gold-2);}

/* CTA */
.cta{display:block;width:100%;text-align:center;text-decoration:none;border:none;cursor:pointer;
  font-family:inherit;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#35B36B,#1C7C46);color:#fff;border-radius:var(--r-md);
  padding:15px 14px;margin-bottom:12px;
  box-shadow:0 16px 34px -14px rgba(46,155,87,.9), inset 0 1px 0 rgba(255,255,255,.24);
  transition:transform .3s var(--spring), box-shadow .3s var(--ease);}
.cta:active{transform:scale(.982);box-shadow:0 8px 20px -12px rgba(46,155,87,.9);}
.cta::after{content:'';position:absolute;top:0;bottom:0;width:70px;left:var(--sheen);
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.3),transparent);
  animation:sheen 3.6s var(--ease) 1.6s infinite;}
.cta .big{font-size:16px;font-weight:800;letter-spacing:-.01em;}
.cta .sm{font-size:10px;font-weight:600;opacity:.85;margin-top:3px;}
.ghost{display:block;width:100%;text-align:center;text-decoration:none;font-family:inherit;
  border:1px solid var(--glass-line);background:var(--glass);color:var(--gold-2);
  border-radius:var(--r-md);padding:13px;font-size:13px;font-weight:800;margin-bottom:12px;
  transition:transform .3s var(--spring), background .25s var(--ease);}
.ghost:active{transform:scale(.982);background:rgba(255,255,255,.09);}

/* panels */
.panel{background:var(--glass);border:1px solid var(--glass-line);border-radius:var(--r-lg);
  padding:15px 15px 13px;margin-bottom:12px;
  backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);}
.panel h2{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;
  color:var(--gold-2);display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px;}
.panel h2 .ta{font-size:10.5px;font-weight:600;letter-spacing:0;text-transform:none;color:rgba(252,246,233,.62);}

/* segmented filter */
.seg{display:flex;gap:4px;background:rgba(0,0,0,.26);border-radius:11px;padding:4px;margin:11px 0 4px;}
.seg button{flex:1;border:none;background:transparent;color:rgba(252,246,233,.66);cursor:pointer;
  font-family:inherit;font-size:11px;font-weight:700;padding:8px 4px;border-radius:8px;
  transition:color .25s var(--ease), background .3s var(--ease);}
.seg button.on{background:linear-gradient(150deg,var(--maroon-2),var(--maroon));color:#fff;
  box-shadow:0 4px 12px -4px rgba(122,18,38,.8);}

/* ledger rows */
.ins{display:flex;align-items:center;gap:12px;padding:12px 2px;position:relative;
  border-bottom:1px solid rgba(232,200,116,.09);}
.ins:last-child{border-bottom:none;}
.ins .n{width:34px;height:34px;flex:0 0 34px;border-radius:11px;display:grid;place-items:center;
  font-size:12px;font-weight:800;background:rgba(255,255,255,.07);color:rgba(252,246,233,.66);
  border:1px solid transparent;}
.ins.paid .n{background:rgba(46,155,87,.18);color:var(--green-2);border-color:rgba(123,217,161,.3);}
.ins.part .n{background:rgba(224,167,59,.18);color:var(--amber);border-color:rgba(224,167,59,.35);}
.ins.miss .n{background:rgba(217,83,79,.18);color:#F0918D;border-color:rgba(217,83,79,.35);}
.ins.next .n{background:linear-gradient(150deg,var(--gold),#B8860B);color:#2A1810;
  border-color:var(--gold-2);box-shadow:0 0 0 3px rgba(217,169,60,.16);}
.ins.next::before{content:'';position:absolute;left:-15px;right:-15px;top:2px;bottom:2px;border-radius:12px;
  background:linear-gradient(90deg,rgba(217,169,60,.13),transparent 72%);pointer-events:none;}
.ins .mid{flex:1;min-width:0;position:relative;}
.ins .d{font-size:13px;font-weight:700;letter-spacing:-.01em;}
.ins .s{font-size:9.5px;color:rgba(252,246,233,.62);margin-top:2px;font-weight:500;}
.ins .amt{text-align:right;flex-shrink:0;position:relative;}
.ins .amt b{font-size:13.5px;font-weight:800;letter-spacing:-.02em;}
.chip{display:inline-block;font-size:8px;font-weight:800;letter-spacing:.05em;padding:3px 7px;
  border-radius:7px;margin-top:3px;}
.c-paid{background:rgba(46,155,87,.2);color:var(--green-2);}
.c-part{background:rgba(224,167,59,.2);color:var(--amber);}
.c-miss{background:rgba(217,83,79,.2);color:#F0918D;}
.c-pend{background:rgba(255,255,255,.09);color:rgba(252,246,233,.66);}
.empty{text-align:center;font-size:11.5px;color:rgba(252,246,233,.6);padding:22px 6px;}

/* detail rows */
.rw{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;
  border-bottom:1px solid rgba(232,200,116,.09);font-size:13px;}
.rw:last-child{border-bottom:none;}
.rw>span{color:rgba(252,246,233,.66);font-size:11.5px;font-weight:500;}
.rw>span .ta{display:block;font-size:10px;opacity:.75;}
.rw>b{text-align:right;font-weight:800;letter-spacing:-.01em;}

.notice{border-radius:var(--r-md);padding:11px 13px;font-size:11px;line-height:1.6;font-weight:600;
  margin-bottom:12px;background:rgba(224,167,59,.13);border:1px solid rgba(224,167,59,.3);color:#F0CE8C;}
.foot{text-align:center;font-size:9.5px;color:rgba(252,246,233,.48);line-height:1.75;margin-top:18px;}

/* failure states */
.bad{text-align:center;padding:26px 8px;}
.bad h1{font-family:'DM Serif Display',serif;font-size:21px;color:var(--maroon);margin-bottom:10px;}
.bad p{font-size:12.5px;color:var(--muted);line-height:1.7;}
.diag{margin-top:16px;padding:9px 11px;background:rgba(184,134,11,.11);border-radius:9px;
  font-size:10px;color:#8A6D00;line-height:1.55;}
</style>
</head>
<body>

<div id="fx"><div class="ring"></div><div class="tick">🔓</div></div>
<div id="bar" aria-hidden="true"><div class="l" id="barL"></div><div class="r num" id="barR"></div></div>

<div class="wrap">

  <!-- ══ LOCK ══ -->
  <main id="lock" class="paper"><div class="in">
    <div class="kolam"></div>
    <div class="seal">📘</div>
    <div class="lk-shop" id="lkShop">Passbook</div>
    <div class="lk-shop-ta ta" id="lkShopTa"></div>
    <div style="text-align:center;margin-top:11px;"><span class="pill">EMI PASSBOOK <span class="ta">· தவணை பாஸ்புக்</span></span></div>
    <h1 class="lk-hi" id="lkHi">Enter your 4-digit PIN</h1>
    <div class="lk-sub ta">உங்கள் 4 இலக்க PIN-ஐ உள்ளிடவும்</div>
    <div class="pins" id="pins" role="group" aria-label="4 digit PIN">
      <input type="tel" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="PIN digit 1">
      <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="PIN digit 2">
      <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="PIN digit 3">
      <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="PIN digit 4">
    </div>
    <div class="err" id="err" role="alert" aria-live="assertive"></div>
    <div class="hint">Works without internet — your details travel inside the link itself, never on a server.<br>
      <span class="ta">இணையம் இல்லாமலும் வேலை செய்யும்.</span></div>
    <div class="kolam" style="margin-top:18px;"></div>
  </div></main>

  <!-- ══ BOOK ══ -->
  <div id="book"></div>
  <div class="foot" id="foot"></div>
</div>

(function(){

var EL=function(id){return document.getElementById(id);};
var esc=function(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
var IN=function(v){return Math.round(v||0).toLocaleString('en-IN');};
var R =function(v){return '\u20B9'+IN(v);};
var fD=function(d){if(!d)return '\u2014';var p=String(d).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;};
var todayISO=function(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');};
var days=function(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5);};
var REDUCED=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var buzz=function(ms){ try{ if(navigator.vibrate&&!REDUCED) navigator.vibrate(ms); }catch(e){} };

/* ── decode payload ─────────────────────────────────────────────────────────
   Share paths mangle fragments: some in-app browsers percent-encode them,
   some turn '+' into a space, long links occasionally get clipped. Try the
   plausible repairs, and never throw — an uncaught error leaves a blank page. */
function readFragment(){
  var raw=(location.hash||'').replace(/^#/,'');
  if(!raw) return {frag:'',data:null};
  var tries=[raw];
  if(raw.indexOf('%')>-1){ try{ tries.push(decodeURIComponent(raw)); }catch(e){} }
  if(raw.indexOf(' ')>-1) tries.push(raw.replace(/ /g,'+'));
  for(var i=0;i<tries.length;i++){
    try{ var s=LZString.decompressFromEncodedURIComponent(tries[i]);
      if(s){ var o=JSON.parse(s); if(o&&o.s) return {frag:raw,data:o}; } }catch(e){}
  }

}
var _r=readFragment(), D=_r.data;

if(!D){
  var body,diag='';
  if(!_r.frag){
    body='<h1>Nothing to open yet</h1><p>This page only works when it is opened from the QR code on '+
      'your receipt or passbook card, or from the link the shop sent you \u2014 your details travel inside that link.'+
      '<br><br>Please scan the QR again, or tap the link in your message.<br><br>'+
      '<span class="ta">ரசீதில் உள்ள QR-ஐ ஸ்கேன் செய்து திறக்கவும்.</span></p>';
  }else{
    body='<h1>Link not readable</h1><p>This passbook link looks incomplete \u2014 it was probably cut short '+
      'when it was copied or forwarded. Please scan the QR on your receipt again, or ask the shop to resend it.'+
      '<br><br><span class="ta">இந்த இணைப்பு முழுமையாக இல்லை. ரசீதில் உள்ள QR-ஐ மீண்டும் ஸ்கேன் செய்யவும்.</span></p>';
    diag='<div class="diag">Received '+_r.frag.length+' characters \u2014 a full link is usually 400\u2013900. '+
      'Show this line to the shop if it keeps happening.</div>';
  }
  document.querySelector('.wrap').innerHTML='<div class="paper"><div class="in"><div class="bad">'+body+diag+'</div></div></div>';
  return;
}

EL('lkShop').textContent=D.sn||'Passbook';
EL('lkShopTa').textContent=D.snt||'';
if(D.cn) EL('lkHi').textContent='Hello, '+D.cn;
EL('foot').innerHTML=esc(D.sn||'')+(D.sp?' \u00B7 \u260E '+esc(D.sp):'')+
  '<br>Snapshot taken '+fD(D.gen)+' \u00B7 computer-generated, valid without seal';

/* ── PIN gate ── */
var boxes=[].slice.call(document.querySelectorAll('#pins input')), tries=0;
boxes.forEach(function(b,i){
  b.addEventListener('input',function(){
    b.value=b.value.replace(/\D/g,'');
    if(b.value){ b.classList.add('ok'); buzz(9); if(i<3) boxes[i+1].focus(); else check(); }
    else b.classList.remove('ok');
  });
  b.addEventListener('keydown',function(e){
    if(e.key==='Backspace'&&!b.value&&i>0){boxes[i-1].focus();boxes[i-1].value='';boxes[i-1].classList.remove('ok');}
    if(e.key==='Enter') check();
  });
  b.addEventListener('paste',function(e){
    var t=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,4);
    if(!t.length) return;
    e.preventDefault();
    boxes.forEach(function(x,j){x.value=t[j]||'';x.classList.toggle('ok',!!t[j]);});
    if(t.length===4) check(); else boxes[t.length].focus();
  });
});
setTimeout(function(){ if(window.innerWidth>640) boxes[0].focus(); },400);

function check(){
  var got=boxes.map(function(b){return b.value;}).join('');
  if(got.length<4) return;
  if(String(D.sec||'')===got){ buzz([14,50,26]); unlock(); return; }
  tries++; buzz([40,60,40]);
  EL('pins').classList.add('shake');
  EL('err').textContent = tries>=3 ? 'Still wrong — please call the shop.' : 'Incorrect PIN. Try again.';
  setTimeout(function(){EL('pins').classList.remove('shake');},480);
  setTimeout(function(){boxes.forEach(function(b){b.value='';b.classList.remove('ok');});boxes[0].focus();},500);
}

function swap(){
  EL('lock').style.display='none';
  render();
  EL('book').classList.add('show');
  window.scrollTo(0,0);
  animate();
}
function unlock(){
  if(REDUCED){ swap(); return; }
  var fx=EL('fx'); fx.classList.add('on');
  setTimeout(function(){ fx.querySelector('.ring').style.display='none'; fx.querySelector('.tick').classList.add('go'); },640);
  setTimeout(function(){
    fx.classList.remove('on');
    /* View Transitions where supported, plain swap everywhere else */
    if(document.startViewTransition){ document.startViewTransition(swap); } else swap();
  },1120);
}

/* ── derive plan figures ──
   row = [m, dueDate, emi, paidAmount, paidDate, lateFee, statusCode] */
var TODAY=todayISO(), ROWS=D.s||[], N=ROWS.length;
var paidCt=0,totalDue=0,totalPaid=0,nextRow=null,overdueCt=0;
ROWS.forEach(function(r){
  totalDue+=(r[2]||0)+(r[5]||0);
  totalPaid+=(r[3]||0);
  if(r[6]===2) paidCt++; else { if(!nextRow) nextRow=r; if(r[1]<TODAY) overdueCt++; }
});
var balance=Math.max(0,totalDue-totalPaid);
var pct=N?Math.round(paidCt/N*100):0;
var nextAmt=nextRow?Math.max(0,(nextRow[2]||0)-(nextRow[3]||0)+(nextRow[5]||0)):0;
var typeLbl={reducing:'Reducing Balance',flat:'Flat Rate',bullet:'Bullet / Lump Sum'}[D.ty]||D.ty||'\u2014';
var FILTER='all';

function rowClass(r){
  var overdue = r[6]!==2 && r[1]<TODAY;
  var c = r[6]===2?'paid' : r[6]===1?'part' : overdue?'miss' : '';
  /* the next unpaid row always gets the highlight — even when it is also a
     partial or overdue row, which the first version silently skipped */
  if(nextRow && r[0]===nextRow[0]) c += (c?' ':'')+'next';
  return c;
}

function ledgerHTML(){
  var list=ROWS.filter(function(r){
    return FILTER==='all' ? true : FILTER==='paid' ? r[6]===2 : r[6]!==2;
  });
  if(!list.length) return '<div class="empty">Nothing here yet.</div>';
  return list.map(function(r){
    var overdue=r[6]!==2 && r[1]<TODAY;
    var chip = r[6]===2 ? '<span class="chip c-paid">PAID</span>'
             : r[6]===1 ? '<span class="chip c-part">PART PAID</span>'
             : overdue  ? '<span class="chip c-miss">OVERDUE</span>'
             :            '<span class="chip c-pend">DUE</span>';
    var sub = r[6]===2 ? 'Paid '+fD(r[4])
            : r[6]===1 ? 'Paid '+R(r[3])+' \u00B7 still '+R(Math.max(0,(r[2]||0)-(r[3]||0)+(r[5]||0)))
            : overdue  ? 'Was due '+fD(r[1])+(r[5]>0?' \u00B7 late fee '+R(r[5]):'')
            :            'Due '+fD(r[1]);
    return '<div class="ins '+rowClass(r)+'">'+
        '<div class="n num">'+r[0]+'</div>'+
        '<div class="mid"><div class="d num">'+fD(r[1])+'</div><div class="s">'+sub+'</div></div>'+
        '<div class="amt"><b class="num">'+R((r[2]||0)+(r[5]||0))+'</b><br>'+chip+'</div>'+
      '</div>';
  }).join('');
}

window._segTo=function(mode,btn){
  FILTER=mode; buzz(8);
  [].slice.call(btn.parentNode.children).forEach(function(b){b.classList.toggle('on',b===btn);});
  var box=EL('ledger'); box.innerHTML=ledgerHTML();
  if(!REDUCED){
    [].slice.call(box.children).forEach(function(el,i){
      el.animate([{opacity:0,transform:'translateY(9px)'},{opacity:1,transform:'none'}],
                 {duration:330,delay:Math.min(i*26,240),easing:'cubic-bezier(.22,1,.36,1)',fill:'both'});
    });
  }
};

    '<span class="ta">புதிய இணைப்பைக் கேட்கவும்.</span></div>' : '';

  EL('book').innerHTML=
  '<section class="hero rv">'+

    '</div><div class="tagchip">'+(overdueCt?overdueCt+' OVERDUE':(nextRow?'ACTIVE':'CLOSED'))+'</div></div>'+
    '<div class="heroMid">'+
      '<div class="bal"><div class="lbl">BALANCE REMAINING<span class="ta">நிலுவைத் தொகை</span></div>'+
        '<div class="v num" id="balV">\u20B90</div></div>'+
      '<div class="ring" id="ring"><div class="rv2"><div class="pc num" id="pcV">0%</div>'+
        '<div class="of num">'+paidCt+'/'+N+' paid</div></div></div>'+
    '</div>'+
    '<div class="duechip"><span class="dot'+(late?' late':'')+'"></span>'+
      '<div class="t">'+dueTxt+(nextRow?'<small>Installment #'+nextRow[0]+' \u00B7 '+fD(nextRow[1])+'</small>':'')+'</div></div>'+
  '</section>'+
  stale+
  '<div class="kpis">'+
    '<div class="kpi rv gold"><div class="ic">\u23F1</div><div class="l">Next Amount<span class="ta">அடுத்த தொகை</span></div>'+
      '<div class="v num" data-count="'+Math.round(nextAmt)+'">'+(nextRow?'\u20B90':'\u2014')+'</div></div>'+
    '<div class="kpi rv"><div class="ic">\uD83D\uDCC5</div><div class="l">Next Due<span class="ta">அடுத்த தேதி</span></div>'+
      '<div class="v">'+(nextRow?fD(nextRow[1]):'\u2705 Done')+'</div></div>'+
    '<div class="kpi rv good"><div class="ic">\u2713</div><div class="l">Total Paid<span class="ta">செலுத்தியது</span></div>'+
      '<div class="v num" data-count="'+Math.round(totalPaid)+'">\u20B90</div></div>'+
    '<div class="kpi rv'+(overdueCt?' warn':'')+'"><div class="ic">\u2211</div><div class="l">Plan Total<span class="ta">மொத்தத் திட்டம்</span></div>'+
      '<div class="v num" data-count="'+Math.round(totalDue)+'">\u20B90</div></div>'+
  '</div>'+
  upi+
  '<section class="panel rv"><h2>Installment Ledger <span class="ta">தவணைப் பதிவு</span></h2>'+
    '<div class="seg" role="tablist">'+
      '<button class="on" onclick="_segTo(\'all\',this)">All · '+N+'</button>'+
      '<button onclick="_segTo(\'due\',this)">Remaining · '+(N-paidCt)+'</button>'+
      '<button onclick="_segTo(\'paid\',this)">Paid · '+paidCt+'</button>'+
    '</div>'+
    '<div id="ledger">'+ledgerHTML()+'</div>'+

  '<section class="panel rv"><h2>Loan Details <span class="ta">கடன் விவரம்</span></h2>'+
    '<div class="rw"><span>Pledge No.<span class="ta">அடகு எண்</span></span><b class="num">'+esc(D.b||'\u2014')+'</b></div>'+

  '</section>'+

/* ── entrance choreography ── */
/* Count-up with a guaranteed landing. requestAnimationFrame is paused while a
   tab is backgrounded — a customer who scans the QR, switches to WhatsApp and
   comes back would otherwise find the figure frozen part-way. The timeout and
   the visibility handler both snap it to the true value. */
function countUp(el,to,fmt){
  if(REDUCED||to<=0){ el.textContent=fmt(to); return; }
  var t0=null, dur=900, done=false;
  function land(){ if(done) return; done=true; el.textContent=fmt(to); }
  function step(t){
    if(done) return;
    if(!t0) t0=t;
    var p=Math.min(1,(t-t0)/dur);
    el.textContent=fmt(Math.round(to*(1-Math.pow(1-p,4))));   /* easeOutQuart */
    if(p<1) requestAnimationFrame(step); else land();
  }
  requestAnimationFrame(step);
  setTimeout(land,dur+260);
  document.addEventListener('visibilitychange',function h(){
    if(document.visibilityState==='visible'){ land(); document.removeEventListener('visibilitychange',h); }
  });
}

function animate(){
  /* staggered reveal — IntersectionObserver so it also fires on scroll */
  var items=[].slice.call(document.querySelectorAll('#book .rv'));
  if(!('IntersectionObserver' in window)||REDUCED){
    items.forEach(function(el){el.classList.add('in');});
  }else{
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){
        if(!e.isIntersecting) return;
        var el=e.target, i=items.indexOf(el);
        el.style.transitionDelay=Math.min(i*70,420)+'ms';
        el.classList.add('in');
        if(el.classList.contains('kpi')) setTimeout(function(){el.classList.add('lit');},260);
        io.unobserve(el);
      });
    },{threshold:.12,rootMargin:'0px 0px -8% 0px'});
    items.forEach(function(el){io.observe(el);});
  }

  /* headline numbers */
  countUp(EL('balV'),balance,function(v){return R(v);});
  countUp(EL('pcV'),pct,function(v){return v+'%';});
  [].slice.call(document.querySelectorAll('#book [data-count]')).forEach(function(el){
    countUp(el,parseFloat(el.getAttribute('data-count'))||0,function(v){return R(v);});
  });

  /* conic progress ring */
  var ring=EL('ring');
  if(ring){
    if(REDUCED){ ring.style.setProperty('--ring',pct); }
    else{
      var t0=null, rdone=false;
      var rland=function(){ if(rdone) return; rdone=true; ring.style.setProperty('--ring',pct); };
      requestAnimationFrame(function tick(t){
        if(rdone) return;
        if(!t0) t0=t;
        var p=Math.min(1,(t-t0)/1100);
        ring.style.setProperty('--ring',(pct*(1-Math.pow(1-p,4))).toFixed(2));
        if(p<1) requestAnimationFrame(tick); else rland();
      });
      setTimeout(rland,1400);
    }
  }

  /* condensed sticky bar once the hero scrolls past */
  var hero=document.querySelector('#book .hero'), bar=EL('bar');
  if(hero&&bar&&'IntersectionObserver' in window){
    new IntersectionObserver(function(es){
      bar.classList.toggle('on',!es[0].isIntersecting);
      bar.setAttribute('aria-hidden',es[0].isIntersecting?'true':'false');
    },{threshold:0,rootMargin:'-56px 0px 0px 0px'}).observe(hero);
  }
}
})();
</script>
